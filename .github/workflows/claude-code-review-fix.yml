name: Claude Code - Fix Reviews

on:
  # Trigger when CodeRabbit (or any reviewer) submits a review
  pull_request_review:
    types: [submitted]

  # Also trigger on @claude mentions in PR/issue comments
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # Auto-fix: runs when CodeRabbit requests changes — no @claude needed
  fix-review:
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.user.login == 'coderabbitai[bot]' &&
      github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code - Fix Review Feedback
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            CodeRabbit has submitted a review requesting changes on this PR.

            Read every review comment carefully. For each actionable comment:
            1. Fix the issue in the code
            2. If the comment is about style/formatting, fix it
            3. If the comment is about a bug or logic error, fix it
            4. If the comment is about missing tests, add the tests
            5. If the comment is a nitpick or suggestion you disagree with, leave a reply explaining why

            After fixing, run `npm run check` to make sure everything passes.

            Do NOT change anything that wasn't flagged in the review.

  # Interactive: respond to @claude mentions in any PR/issue comment or review
  interactive:
    if: >
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code - Interactive
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
