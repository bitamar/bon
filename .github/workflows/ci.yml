name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api:
    name: API - Build, Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    defaults:
      run:
        working-directory: .
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for database
        run: npx wait-on tcp:127.0.0.1:5432

      - name: TypeScript compilation
        run: npm run build --workspace api

      - name: Lint
        run: npm run lint --workspace api

      - name: Run tests
        env:
          TEST_PG_ADMIN_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: npm run coverage --workspace api

      - name: API coverage summary
        if: always()
        run: |
          node .github/scripts/coverage-summary.js api "API Coverage" > api-coverage.md || true
          cat api-coverage.md >> $GITHUB_STEP_SUMMARY || true

      - name: API coverage comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: API Coverage
          path: api-coverage.md

  pdf:
    name: PDF - Build, Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation
        run: npm run type-check --workspace pdf

      - name: Lint
        run: npm run lint --workspace pdf

      - name: Run tests
        run: npm run coverage --workspace pdf

      - name: PDF coverage summary
        if: always()
        run: |
          node .github/scripts/coverage-summary.js pdf "PDF Coverage" > pdf-coverage.md || true
          cat pdf-coverage.md >> $GITHUB_STEP_SUMMARY || true

      - name: PDF coverage comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: PDF Coverage
          path: pdf-coverage.md

  frontend:
    name: Frontend - Build, Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    defaults:
      run:
        working-directory: .
    env:
      VITE_API_BASE_URL: http://localhost:3000/api

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation
        run: npm run type-check --workspace front

      - name: Lint
        run: npm run lint --workspace front

      - name: Run tests
        run: npm run test:coverage --workspace front

      - name: Format check
        run: npm run format:check --workspace front

      - name: Frontend coverage summary
        if: always()
        run: |
          node .github/scripts/coverage-summary.js front "Frontend Coverage" > front-coverage.md || true
          cat front-coverage.md >> $GITHUB_STEP_SUMMARY || true

      - name: Frontend coverage comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: Frontend Coverage
          path: front-coverage.md
